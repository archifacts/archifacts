name: Verify (PR)

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        java: [ '11', '17', '21', '25' ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: '${{ matrix.java }}'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: |
          BRANCH_NAME=${{ github.head_ref }}
          SAFE_BRANCH_NAME=${BRANCH_NAME//\//-}
          mvn --batch-mode --update-snapshots -Drevision=${SAFE_BRANCH_NAME}-SNAPSHOT verify
