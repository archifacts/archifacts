name: verify on push

on:
  push:
    branches:
    - '**' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: 
      contents: read
      packages: write 
    strategy:
      fail-fast: false
      matrix:
        archunit-version: ['1.4.1']
        java: [ '11', '17', '21', '25' ]
        
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots -Drevision=0.0.0-SNAPSHOT verify -Darchunit.version=${{ matrix.archunit-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
